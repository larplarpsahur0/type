<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuxeWear — V1</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    #t{display:none;}
    #sb{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#fff;transition:0.3s;padding-top:60px;z-index:999;box-shadow:2px 0 8px rgba(0,0,0,0.1);}
    #sb a{display:block;padding:14px 24px;color:#444;text-decoration:none;}
    #sb a:hover{background:#fce4ec;color:#c2185b;}
    #t:checked~#sb{left:0;}
    #mc{transition:margin-left 0.3s;}
    #t:checked~#mc{margin-left:260px;}
    .lb{position:fixed;top:15px;left:15px;z-index:1000;font-size:26px;cursor:pointer;background:#c2185b;color:#fff;padding:4px 10px;border-radius:4px;}
    .hero{background:linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),url('https://images.unsplash.com/photo-1445205170230-053b83016050?w=1200');background-size:cover;padding:100px 0;text-align:center;color:#fff;}
    .card-img-top{height:260px;object-fit:cover;}
  </style>
</head>
<body>
  <input type="checkbox" id="t">
  <label for="t" class="lb"><i class="bi bi-list"></i></label>
  <div id="sb">
    <a href="#"><i class="bi bi-house"></i> Home</a>
    <a href="#shop"><i class="bi bi-bag"></i> Shop</a>
    <a href="#new"><i class="bi bi-stars"></i> New Arrivals</a>
    <a href="#contact"><i class="bi bi-envelope"></i> Contact</a>
  </div>
  <div id="mc">
    <div class="hero">
      <h1 class="display-4 fw-bold">LuxeWear</h1>
      <p class="lead">Style that speaks</p>
    </div>
    <div class="container py-5" id="shop">
      <h2 class="mb-4 text-center">Trending Now</h2>
      <div class="row g-4">
        <div class="col-md-3 col-sm-6">
          <div class="card h-100 border-0 shadow-sm">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf54?w=400" class="card-img-top" alt="Dress">
            <div class="card-body text-center">
              <h6 class="card-title">Evening Gown</h6>
              <p class="card-text fw-bold text-danger">$129</p>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-6">
          <div class="card h-100 border-0 shadow-sm">
            <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400" class="card-img-top" alt="Jacket">
            <div class="card-body text-center">
              <h6 class="card-title">Leather Jacket</h6>
              <p class="card-text fw-bold text-danger">$199</p>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-6">
          <div class="card h-100 border-0 shadow-sm">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" class="card-img-top" alt="Sneakers">
            <div class="card-body text-center">
              <h6 class="card-title">Urban Sneakers</h6>
              <p class="card-text fw-bold text-danger">$89</p>
            </div>
          </div>
        </div>
        <div class="col-md-3 col-sm-6">
          <div class="card h-100 border-0 shadow-sm">
            <img src="https://images.unsplash.com/photo-1548036328-c9fa89d128f6?w=400" class="card-img-top" alt="Bag">
            <div class="card-body text-center">
              <h6 class="card-title">Tote Bag</h6>
              <p class="card-text fw-bold text-danger">$59</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container py-5" id="contact">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h2 class="mb-4 text-center">Customer Care</h2>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Name" required></div>
              <div class="col-md-6"><input type="email" class="form-control" placeholder="Email" required></div>
              <div class="col-md-6"><input type="tel" class="form-control" placeholder="Phone"></div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Order ID"></div>
              <div class="col-12"><textarea class="form-control" rows="4" placeholder="Describe your issue or query" required></textarea></div>
              <div class="col-12 text-center"><button type="submit" class="btn btn-danger px-5">Send</button></div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer class="bg-dark text-white text-center py-4">
      <p class="mb-0">&copy; 2026 LuxeWear. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
