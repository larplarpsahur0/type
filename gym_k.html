<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IronPulse Gym — V2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    #t{display:none;}
    #sb{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#0f0f0f;transition:0.3s;padding-top:60px;z-index:999;border-right:1px solid #39ff14;}
    #sb a{display:block;padding:14px 24px;color:#39ff14;text-decoration:none;}
    #sb a:hover{background:#1a1a1a;color:#fff;}
    #t:checked~#sb{left:0;}
    #mc{transition:margin-left 0.3s;background:#0a0a0a;color:#eee;}
    #t:checked~#mc{margin-left:260px;}
    .lb{position:fixed;top:15px;left:15px;z-index:1000;font-size:26px;cursor:pointer;background:#39ff14;color:#000;padding:4px 10px;border-radius:4px;}
    .hero{background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?w=1200');background-size:cover;padding:100px 0;text-align:center;color:#39ff14;}
    .card-img-top{height:200px;object-fit:cover;}
    .card{background:#141414;border:1px solid #39ff14;color:#eee;}
    .form-control{background:#1e1e1e;color:#eee;border:1px solid #333;}
    .form-control::placeholder{color:#888;}
  </style>
</head>
<body>
  <input type="checkbox" id="t">
  <label for="t" class="lb"><i class="bi bi-list"></i></label>
  <div id="sb">
    <a href="#"><i class="bi bi-house"></i> Home</a>
    <a href="#programs"><i class="bi bi-lightning"></i> Programs</a>
    <a href="#schedule"><i class="bi bi-calendar"></i> Schedule</a>
    <a href="#contact"><i class="bi bi-envelope"></i> Contact</a>
  </div>
  <div id="mc">
    <div class="hero">
      <h1 class="display-4 fw-bold">IronPulse Gym</h1>
      <p class="lead">Fuel the beast inside</p>
    </div>
    <div class="container py-5" id="programs">
      <h2 class="mb-4 text-center">Elite Programs</h2>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?w=400" class="card-img-top" alt="Crossfit">
            <div class="card-body">
              <h5 class="card-title">CrossFit</h5>
              <p class="card-text text-muted">Functional fitness at maximum intensity.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?w=400" class="card-img-top" alt="Boxing">
            <div class="card-body">
              <h5 class="card-title">Combat Boxing</h5>
              <p class="card-text text-muted">Striking, defense, and conditioning.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?w=400" class="card-img-top" alt="Calisthenics">
            <div class="card-body">
              <h5 class="card-title">Calisthenics</h5>
              <p class="card-text text-muted">Bodyweight mastery and control.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container py-5" id="contact">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h2 class="mb-4 text-center">Membership</h2>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Name" required></div>
              <div class="col-md-6"><input type="email" class="form-control" placeholder="Email" required></div>
              <div class="col-md-6"><input type="tel" class="form-control" placeholder="Phone"></div>
              <div class="col-md-6"><input type="number" class="form-control" placeholder="Age"></div>
              <div class="col-md-6">
                <select class="form-select" style="background:#1e1e1e;color:#eee;border:1px solid #333;">
                  <option selected>Plan</option>
                  <option>Basic</option>
                  <option>Pro</option>
                  <option>Elite</option>
                </select>
              </div>
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Goal"></div>
              <div class="col-12"><textarea class="form-control" rows="3" placeholder="Tell us about yourself"></textarea></div>
              <div class="col-12 text-center"><button type="submit" class="btn btn-success px-5" style="background:#39ff14;color:#000;border:none;">Join</button></div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer class="text-center py-4" style="border-top:1px solid #333;">
      <p class="mb-0 text-muted">&copy; 2026 IronPulse Gym. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
