<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savor Bistro — V2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    #t{display:none;}
    #sb{position:fixed;top:0;left:-260px;width:260px;height:100vh;background:#1a1a1a;transition:0.3s;padding-top:60px;z-index:999;border-right:1px solid #333;}
    #sb a{display:block;padding:14px 24px;color:#d4af37;text-decoration:none;}
    #sb a:hover{background:#2a2a2a;color:#fff;}
    #t:checked~#sb{left:0;}
    #mc{transition:margin-left 0.3s;background:#121212;color:#eee;}
    #t:checked~#mc{margin-left:260px;}
    .lb{position:fixed;top:15px;left:15px;z-index:1000;font-size:26px;cursor:pointer;background:#d4af37;color:#121212;padding:4px 10px;border-radius:4px;}
    .hero{background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),url('https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1200');background-size:cover;padding:100px 0;text-align:center;color:#d4af37;}
    .card-img-top{height:200px;object-fit:cover;}
    .card{background:#1e1e1e;color:#eee;border:1px solid #333;}
    .form-control{background:#2a2a2a;color:#eee;border:1px solid #444;}
    .form-control::placeholder{color:#888;}
  </style>
</head>
<body>
  <input type="checkbox" id="t">
  <label for="t" class="lb"><i class="bi bi-list"></i></label>
  <div id="sb">
    <a href="#"><i class="bi bi-house"></i> Home</a>
    <a href="#menu"><i class="bi bi-menu-button"></i> Menu</a>
    <a href="#about"><i class="bi bi-info-circle"></i> About</a>
    <a href="#contact"><i class="bi bi-envelope"></i> Contact</a>
  </div>
  <div id="mc">
    <div class="hero">
      <h1 class="display-4 fw-bold">Savor Bistro</h1>
      <p class="lead">An evening of elegance</p>
    </div>
    <div class="container py-5" id="menu">
      <h2 class="mb-4 text-center">Chef's Selection</h2>
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=400" class="card-img-top" alt="Steak">
            <div class="card-body">
              <h5 class="card-title">Wagyu Steak</h5>
              <p class="card-text text-muted">A5 grade with truffle jus.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1534939561126-855b8675edd7?w=400" class="card-img-top" alt="Pasta">
            <div class="card-body">
              <h5 class="card-title">Lobster Ravioli</h5>
              <p class="card-text text-muted">Saffron cream and caviar.</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card h-100">
            <img src="https://images.unsplash.com/photo-1488477181946-6428a029177b?w=400" class="card-img-top" alt="Dessert">
            <div class="card-body">
              <h5 class="card-title">Gold Leaf Tiramisu</h5>
              <p class="card-text text-muted">Espresso-soaked elegance.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="container py-5" id="contact">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <h2 class="mb-4 text-center">Reservations</h2>
          <form>
            <div class="row g-3">
              <div class="col-md-6"><input type="text" class="form-control" placeholder="Full Name" required></div>
              <div class="col-md-6"><input type="email" class="form-control" placeholder="Email Address" required></div>
              <div class="col-md-6"><input type="tel" class="form-control" placeholder="Phone Number"></div>
              <div class="col-md-6"><input type="date" class="form-control"></div>
              <div class="col-12"><input type="number" class="form-control" placeholder="Number of Guests"></div>
              <div class="col-12"><textarea class="form-control" rows="4" placeholder="Dietary Notes"></textarea></div>
              <div class="col-12 text-center"><button type="submit" class="btn btn-outline-warning px-5">Reserve</button></div>
            </div>
          </form>
        </div>
      </div>
    </div>
    <footer class="text-center py-4" style="border-top:1px solid #333;">
      <p class="mb-0 text-muted">&copy; 2026 Savor Bistro. All rights reserved.</p>
    </footer>
  </div>
</body>
</html>
